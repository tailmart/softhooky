name: Build & Release Tauri Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则使用 package.json)'
        required: false
      notes:
        description: '更新说明'
        required: false
        default: '新版本更新'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run tauri:icons

      - name: Build Windows NSIS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Softhooky ${{ github.ref_name }}'
          releaseBody: '${{ github.event.inputs.notes || ''Softhooky 桌面版新版本'' }}'
          releaseDraft: true
          prerelease: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*_x64-setup.exe
          if-no-files-found: warn

  deploy:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis
          path: artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate update manifest
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p deploy/updates

          # 复制安装包
          cp artifacts/*_x64-setup.exe deploy/updates/ 2>/dev/null || true

          # 生成清单
          NSIS_FILE=$(ls deploy/updates/*_x64-setup.exe 2>/dev/null | head -1 | xargs basename)
          NSIS_SIZE=$(stat -c%s "deploy/updates/$NSIS_FILE" 2>/dev/null || echo 0)
          BASE_URL="http://43.161.228.92:3001/updates"

          cat > deploy/updates/update-manifest.json << EOF
          {
            "version": "$VERSION",
            "notes": "${{ github.event.inputs.notes || '新版本更新' }}",
            "pubDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "nsisFile": "$NSIS_FILE",
            "nsisSize": $NSIS_SIZE,
            "nsisUrl": "$BASE_URL/$NSIS_FILE"
          }
          EOF

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/updates/*"
          target: "/opt/softhooky"
          strip_components: 0
