<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - Softhooky</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', PingFang SC, sans-serif;
            background: linear-gradient(135deg, #171717 0%, #27272A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #171717;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .success-icon svg {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        h1 { font-size: 28px; font-weight: 800; color: #171717; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #525252; margin-bottom: 32px; line-height: 1.6; }
        .info-box {
            background: #F5F5F5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #E5E5E5;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-size: 13px; color: #525252; font-weight: 600; }
        .info-value { font-size: 14px; color: #171717; font-weight: 700; }
        .countdown { font-size: 48px; font-weight: 900; color: #171717; margin-bottom: 8px; }
        .countdown-text { font-size: 13px; color: #A3A3A3; font-weight: 600; }
        .button {
            display: inline-block;
            background: #171717;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            margin-top: 16px;
            cursor: pointer;
            border: none;
        }
        .button:hover { transform: translateY(-2px); }
        .status-processing { color: #F59E0B; }
        .status-success { color: #22C55E; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>支付成功！</h1>
        <p class="subtitle">积分正在充值中...<br>即将自动跳转</p>
        <div class="info-box">
            <div class="info-item">
                <span class="info-label">订单状态</span>
                <span class="info-value status-success">✓ 已支付</span>
            </div>
            <div class="info-item">
                <span class="info-label">积分到账</span>
                <span class="info-value" id="creditStatus">处理中...</span>
            </div>
        </div>
        <div class="countdown" id="countdown">3</div>
        <div class="countdown-text">秒后自动跳转</div>
        <button class="button" id="manualButton">立即返回</button>
    </div>
    <script>
        const token = sessionStorage.getItem('authToken');
        const countdownEl = document.getElementById('countdown');
        const creditStatusEl = document.getElementById('creditStatus');
        
        let countdown = 3;
        
        // 支付成功后显示状态（积分由支付回调自动处理）
        if (token) {
            creditStatusEl.textContent = '✓ 已到账';
            creditStatusEl.classList.add('status-success');
        }
        
        const timer = setInterval(() => {
            countdown--;
            if (countdownEl) countdownEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = window.location.origin + '/#/recharge?sync=1&t=' + Date.now();
            }
        }, 1000);

        document.getElementById('manualButton')?.addEventListener('click', () => {
            clearInterval(timer);
            window.location.href = window.location.origin + '/#/recharge?sync=1&t=' + Date.now();
        });
    </script>
</body>
</html>
